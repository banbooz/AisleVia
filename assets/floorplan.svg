<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" role="img" aria-labelledby="title desc">
  <title id="title">Approximate living-room calibration floor plan</title>
  <desc id="desc">A top-down diagram showing the entrance, sofas, coffee table, fireplace, bookcase, television and example route.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#11263b"/>
      <stop offset="1" stop-color="#07131f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1000" height="650" rx="28" fill="url(#bg)"/>
  <text x="42" y="62" fill="#f5fbff" font-family="system-ui, sans-serif" font-size="34" font-weight="800">AisleVia room map</text>
  <text x="42" y="94" fill="#adc4d5" font-family="system-ui, sans-serif" font-size="18">Approximate proof-of-concept layout from the supplied photos</text>

  <rect x="250" y="125" width="700" height="455" rx="18" fill="#d8dde1" stroke="#f5fbff" stroke-width="5"/>
  <text x="270" y="160" fill="#142332" font-family="system-ui, sans-serif" font-size="24" font-weight="800">TOP-DOWN CALIBRATION VIEW</text>

  <rect x="460" y="138" width="270" height="54" rx="10" fill="#f2f4f5"/>
  <text x="565" y="172" fill="#20272d" font-family="system-ui, sans-serif" font-size="18">Fireplace</text>

  <rect x="765" y="185" width="125" height="62" rx="10" fill="#f2f4f5"/>
  <text x="785" y="222" fill="#20272d" font-family="system-ui, sans-serif" font-size="18">Bookcase</text>

  <rect x="286" y="270" width="118" height="230" rx="12" fill="#e5a718"/>
  <text x="314" y="388" fill="#1c2228" font-family="system-ui, sans-serif" font-size="18">Left sofa</text>

  <rect x="650" y="255" width="180" height="135" rx="12" fill="#e5a718"/>
  <text x="684" y="326" fill="#1c2228" font-family="system-ui, sans-serif" font-size="18">Right settee</text>

  <rect x="475" y="300" width="190" height="88" rx="12" fill="#a97238"/>
  <text x="511" y="350" fill="#151a1e" font-family="system-ui, sans-serif" font-size="18">Coffee table</text>

  <rect x="310" y="178" width="88" height="78" rx="10" fill="#71401f"/>
  <text x="310" y="272" fill="#142332" font-family="system-ui, sans-serif" font-size="16">Rocking chair</text>

  <rect x="874" y="302" width="44" height="185" rx="10" fill="#a97238"/>
  <text x="851" y="514" fill="#142332" font-family="system-ui, sans-serif" font-size="18">TV</text>

  <rect x="610" y="505" width="210" height="55" rx="12" fill="#142c5d"/>
  <text x="650" y="540" fill="#f5fbff" font-family="system-ui, sans-serif" font-size="18">Entrance / start</text>

  <path d="M715 520 C690 490 675 455 650 438 S590 412 568 380" fill="none" stroke="#22e98a" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <polygon points="556,365 583,376 564,394" fill="#22e98a" filter="url(#glow)"/>
  <circle cx="570" cy="344" r="19" fill="#ff334f" stroke="#fff" stroke-width="5" filter="url(#glow)"/>
  <text x="510" y="422" fill="#142332" font-family="system-ui, sans-serif" font-size="16">Example route to item</text>

  <g transform="translate(42 145)">
    <rect width="170" height="40" rx="12" fill="#102a43" stroke="#2f8cff"/>
    <text x="18" y="26" fill="#f5fbff" font-family="system-ui, sans-serif" font-size="16">1. Face fireplace</text>
    <rect y="58" width="170" height="40" rx="12" fill="#102a43" stroke="#2cf58a"/>
    <text x="18" y="84" fill="#f5fbff" font-family="system-ui, sans-serif" font-size="16">2. Place entrance</text>
    <rect y="116" width="170" height="40" rx="12" fill="#102a43" stroke="#ff334f"/>
    <text x="18" y="142" fill="#f5fbff" font-family="system-ui, sans-serif" font-size="16">3. Select item</text>
  </g>

  <text x="42" y="620" fill="#adc4d5" font-family="system-ui, sans-serif" font-size="17">Measurements are estimated. Use the in-app alignment controls to correct position and rotation.</text>
</svg>
