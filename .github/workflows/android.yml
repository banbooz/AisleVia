name: Build Android prototype

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'
      - name: Assemble debug APK
        shell: bash
        run: |
          set +e
          gradle -p android :app:assembleDebug --console=plain > android-build.log 2>&1
          result=$?
          if [ $result -ne 0 ]; then
            echo '--- concise Android build failure ---'
            tail -n 180 android-build.log
            exit $result
          fi
          tail -n 40 android-build.log
      - uses: actions/upload-artifact@v4
        with:
          name: aislevia-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
